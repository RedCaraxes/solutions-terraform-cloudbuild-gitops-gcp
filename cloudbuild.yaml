options:
  default_logs_bucket_behavior: REGIONAL_USER_OWNED_BUCKET

steps:
  # 1. Extraer variables del TAG
  - name: 'gcr.io/cloud-builders/git'
    id: 'parse-tag'
    entrypoint: 'bash'
    env:
      - 'GOOGLE_IMPERSONATE_SERVICE_ACCOUNT=web-tier-tf@rs-web-tier.iam.gserviceaccount.com'
# ... (dentro de cloudbuild_plan.yaml)
    args:
      - '-c'
      - |
        echo "Analizando Tag: $TAG_NAME"
        
        # Extraer variables (1=accion, 2=proyecto, 3=ticket)
        export ACTION=$$(echo "$TAG_NAME" | cut -d'#' -f1)
        export PROJECT_ID=$$(echo "$TAG_NAME" | cut -d'#' -f2)
        export TICKET=$$(echo "$TAG_NAME" | cut -d'#' -f3)
        
        echo "Ticket asociado: $${TICKET}"
        echo "Accion: $${ACTION} | Proyecto: $${PROJECT_ID}"

        FINAL_PATH=""
        for folder in "Projects Production" "Projects Development" "Projects Networking" "Projects Security y Organizations"; do
          if [ -d "$$folder/$${PROJECT_ID}" ]; then
            FINAL_PATH="$$folder/$${PROJECT_ID}"
            echo "Ambiente detectado: $$folder"
            break
          fi
        done

        if [ -z "$$FINAL_PATH" ]; then
          echo "ERROR: Carpeta no encontrada para $${PROJECT_ID}"
          exit 1
        fi

        echo "$$FINAL_PATH" > /workspace/tf_folder
        echo "$${ACTION}" > /workspace/tf_action
        echo "$${TICKET}" > /workspace/tf_ticket

# 2. Ejecutar Terraform
  - name: 'hashicorp/terraform'
    id: 'tf-run'
    entrypoint: 'sh'
    env:
      - 'GOOGLE_IMPERSONATE_SERVICE_ACCOUNT=web-tier-tf@rs-web-tier.iam.gserviceaccount.com'
    args:
      - '-c'
      - |
        TF_ACTION=$$(cat /workspace/tf_action)
        TF_FOLDER=$$(cat /workspace/tf_folder)
        
        echo "---------------------------------------------------------"
        echo "EJECUTANDO: terraform $${TF_ACTION} en $${TF_FOLDER}"
        echo "---------------------------------------------------------"
        
        cd "$${TF_FOLDER}"
        terraform init -input=false --upgrade > /dev/null

        # Definimos los flags extras: si es apply, agregamos -auto-approve
        EXTRA_FLAGS=""
        if [ "$${TF_ACTION}" == "apply" ]; then
          EXTRA_FLAGS="-auto-approve"
        fi

        # Ejecución corregida
        (terraform $${TF_ACTION} -no-color -input=false $${EXTRA_FLAGS} 2>&1) | tee /workspace/tf_result.log

# 3. Informe Final
  - name: 'bash'
    id: 'tf-summary'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Sincronización rápida
        sleep 1
        LOG_FILE="/workspace/tf_result.log"

        if [ ! -f "$$LOG_FILE" ]; then
          echo "ERROR: No se genero el log de Terraform en $$LOG_FILE"
          exit 1
        fi

        TF_ACTION=$$(cat /workspace/tf_action)
        TF_TICKET=$$(cat /workspace/tf_ticket 2>/dev/null || echo "N/A")
        TF_FOLDER=$$(cat /workspace/tf_folder)
        
        echo "========================================================="
        echo "        INFORME DE EJECUCION: $${TF_TICKET}"
        echo "========================================================="
        echo " RUTA:    $${TF_FOLDER}"
        echo " ACCION:  $${TF_ACTION}"
        echo "---------------------------------------------------------"

        # 1. Analizar Errores
        if grep -qi "Error:" "$$LOG_FILE"; then
          echo "ESTADO: FALLIDO"
          echo "DETALLE:"
          sed -n '/Error:/,$p' "$$LOG_FILE" | head -n 15
          exit 1
        fi

        # 2. Resumen de Cambios (Especial para tus módulos de buckets)
        echo "CAMBIOS DETECTADOS:"
        # Captura: "will be created", "Destroying...", "Creating...", etc.
        grep -E "will be|Creating\.\.\.|Destroying\.\.\.|Modifying\.\.\." "$$LOG_FILE" \
          | sed 's/will be//g' | sed 's/\.\.\.//g' | sed 's/^[[:space:]]*//' | sort -u || echo "No hay cambios pendientes."

        echo "---------------------------------------------------------"
        # 3. Resultado Final (La línea de Plan: o Apply complete!)
        grep -E "Plan:|Apply complete!" "$$LOG_FILE" || echo "Operacion finalizada sin resumen."
        echo "========================================================="