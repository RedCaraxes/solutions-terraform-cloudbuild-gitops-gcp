options:
  default_logs_bucket_behavior: REGIONAL_USER_OWNED_BUCKET

steps:
  # 1. Extraer variables del TAG
  - name: 'gcr.io/cloud-builders/git'
    id: 'parse-tag'
    entrypoint: 'bash'
    env:
      - 'GOOGLE_IMPERSONATE_SERVICE_ACCOUNT=web-tier-tf@rs-web-tier.iam.gserviceaccount.com'
# ... (dentro de cloudbuild_plan.yaml)
    args:
      - '-c'
      - |
        echo "Analizando Tag: $TAG_NAME"
        
        # Extraer variables (1=accion, 2=proyecto, 3=ticket)
        export ACTION=$$(echo "$TAG_NAME" | cut -d'#' -f1)
        export PROJECT_ID=$$(echo "$TAG_NAME" | cut -d'#' -f2)
        export TICKET=$$(echo "$TAG_NAME" | cut -d'#' -f3)
        
        echo "Ticket asociado: $${TICKET}"
        echo "Accion: $${ACTION} | Proyecto: $${PROJECT_ID}"

        FINAL_PATH=""
        for folder in Projects Security Networking; do
          if [ -d "$$folder/$${PROJECT_ID}" ]; then
            FINAL_PATH="$$folder/$${PROJECT_ID}"
            echo "Ambiente detectado: $$folder"
            break
          fi
        done

        if [ -z "$$FINAL_PATH" ] && [ -d "$${PROJECT_ID}" ]; then
          FINAL_PATH="$${PROJECT_ID}"
        fi

        if [ -z "$$FINAL_PATH" ]; then
          echo "ERROR: Carpeta no encontrada para $${PROJECT_ID}"
          exit 1
        fi

        echo "$$FINAL_PATH" > /workspace/tf_folder
        echo "$${ACTION}" > /workspace/tf_action

  # 2. Ejecutar Terraform
  - name: 'hashicorp/terraform'
    id: 'tf-run'
    entrypoint: 'sh'
    env:
      - 'GOOGLE_IMPERSONATE_SERVICE_ACCOUNT=web-tier-tf@rs-web-tier.iam.gserviceaccount.com'
    args:
      - '-c'
      - |
        # Recuperamos los valores del workspace
        TF_ACTION=$$(cat /workspace/tf_action)
        TF_FOLDER=$$(cat /workspace/tf_folder)
        
        echo "========================================================="
        echo "INICIANDO: $${TF_ACTION} en $${TF_FOLDER}"
        echo "========================================================="
        cd "$${TF_FOLDER}"
        
        terraform init --upgrade
        if [ "$${TF_ACTION}" == "plan" ]; then
          terraform plan
        elif [ "$${TF_ACTION}" == "apply" ]; then
          terraform apply -auto-approve
        fi

# 3. Resumen Final de Recursos
  - name: 'bash'
    id: 'tf-summary'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Verificación básica de archivos
        [ ! -f /workspace/tf_action ] && { echo "Error: No se encontro info de la accion"; exit 1; }
        [ ! -f /workspace/tf_result.log ] && { echo "Error: No se encontro el log de Terraform"; exit 1; }

        TF_ACTION=$$(cat /workspace/tf_action)
        TF_FOLDER=$$(cat /workspace/tf_folder)
        TF_TICKET=$$(cat /workspace/tf_ticket 2>/dev/null || echo "N/A")
        LOG_FILE="/workspace/tf_result.log"
        
        echo "========================================================="
        echo "        INFORME DE EJECUCION: $${TF_TICKET}"
        echo "========================================================="
        echo " RUTA: $${TF_FOLDER}"
        echo " ACCION: $${TF_ACTION}"
        echo "---------------------------------------------------------"

        # 1. Detectar Errores (Si los hay, mostramos el bloque de error)
        if grep -qi "Error:" "$$LOG_FILE"; then
          echo "ESTADO: FALLIDO"
          echo "DETALLE DEL ERROR:"
          sed -n '/Error:/,$p' "$$LOG_FILE" | head -n 15
          exit 1
        fi

        # 2. Resumen Inteligente de Recursos
        echo "CAMBIOS DETECTADOS EN INFRAESTRUCTURA:"
        
        # Este grep busca las líneas que Terraform usa para anunciar acciones:
        # "will be created", "will be destroyed", "Creating...", "Destroying..."
        grep -E "will be created|will be destroyed|will be updated|Creating\.\.\.|Destroying\.\.\.|Modifying\.\.\." "$$LOG_FILE" \
          | sed 's/will be//g' \
          | sed 's/\.\.\.//g' \
          | sort -u || echo "No se listaron cambios detallados."

        echo "---------------------------------------------------------"
        
        # 3. Mostrar la línea de resumen final (Plan o Apply complete)
        if [ "$${TF_ACTION}" == "plan" ]; then
          grep "Plan:" "$$LOG_FILE" || echo "Resumen de plan no encontrado."
        else
          grep "Apply complete!" "$$LOG_FILE" || echo "Resumen de apply no encontrado."
        fi
        echo "========================================================="