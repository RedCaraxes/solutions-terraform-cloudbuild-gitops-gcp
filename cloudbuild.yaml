options:
  default_logs_bucket_behavior: REGIONAL_USER_OWNED_BUCKET

steps:
  # 1. Extraer variables del TAG
  - name: 'gcr.io/cloud-builders/git'
    id: 'parse-tag'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Analizando Tag: $TAG_NAME"
        
        # Extraemos usando una sintaxis de Bash más robusta para Cloud Build
        # Usamos export para asegurar que estén disponibles
        export ACTION=$(echo $TAG_NAME | cut -d'#' -f1)
        export PROJECT_ID=$(echo $TAG_NAME | cut -d'#' -f2)
        
        echo "Accion detectada: ${ACTION}"
        echo "Proyecto detectado: ${PROJECT_ID}"

        # Validar que la carpeta exista (asumiendo que están en la raíz o en environments/)
        # Ajusta esta ruta según donde pongas tus carpetas de proyecto
        if [ -d "environments/${PROJECT_ID}" ]; then
          echo "environments/${PROJECT_ID}" > /workspace/tf_folder
        elif [ -d "${PROJECT_ID}" ]; then
          echo "${PROJECT_ID}" > /workspace/tf_folder
        else
          echo "ERROR: No existe la carpeta para ${PROJECT_ID}"
          exit 1
        fi
        
        echo "${ACTION}" > /workspace/tf_action

  # 2. Ejecutar Terraform
  - name: 'hashicorp/terraform'
    id: 'tf-run'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        TF_ACTION=$(cat /workspace/tf_action)
        TF_FOLDER=$(cat /workspace/tf_folder)
        
        echo "Ejecutando ${TF_ACTION} en ${TF_FOLDER}"
        cd "${TF_FOLDER}"
        
        terraform init
        if [ "${TF_ACTION}" == "plan" ]; then
          terraform plan
        elif [ "${TF_ACTION}" == "apply" ]; then
          terraform apply -auto-approve
        fi