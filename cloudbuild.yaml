options:
  default_logs_bucket_behavior: REGIONAL_USER_OWNED_BUCKET

steps:
  # 1. Validar el TAG y buscar la carpeta
  - name: 'gcr.io/cloud-builders/git'
    id: 'parse-tag'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Usamos $$ para que Cloud Build no intente sustituirlo antes de tiempo
        echo "Analizando Tag: $TAG_NAME"
        
        if [ -z "$TAG_NAME" ]; then
          echo "ERROR: La variable TAG_NAME está vacía. ¿Estás usando un trigger de TAG?"
          exit 1
        fi

        # Extraer partes del TAG (plan#id#ticket#fecha)
        ACTION=$$(echo "$$TAG_NAME" | awk -F'#' '{print $$1}')
        PROJECT_ID=$$(echo "$$TAG_NAME" | awk -F'#' '{print $$2}')
        
        echo "Accion detectada: $$ACTION"
        echo "Proyecto detectado: $$PROJECT_ID"

        # Lógica de mapeo basada en tu estructura de carpetas real
        if [[ "$$PROJECT_ID" == *"dev"* || "$$PROJECT_ID" == *"tier-1"* ]]; then
          FOLDER="environments/dev"
        elif [[ "$$PROJECT_ID" == *"prod"* ]]; then
          FOLDER="environments/prod"
        else
          echo "ERROR: No se pudo mapear el ID $$PROJECT_ID a una carpeta."
          exit 1
        fi
        
        echo "$$ACTION" > /workspace/tf_action
        echo "$$FOLDER" > /workspace/tf_folder

  # 2. Ejecutar Terraform
  - name: 'hashicorp/terraform'
    id: 'tf-run'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Cargamos las variables guardadas
        TF_ACTION=$$(cat /workspace/tf_action)
        TF_FOLDER=$$(cat /workspace/tf_folder)
        
        echo "Ubicándose en: $$TF_FOLDER"
        cd "$$TF_FOLDER"
        
        terraform init
        
        if [ "$$TF_ACTION" == "plan" ]; then
          terraform plan
        elif [ "$$TF_ACTION" == "apply" ]; then
          terraform apply -auto-approve
        fi